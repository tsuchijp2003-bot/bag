name: bag-monitor

on:
  schedule:
    # 6時間ごとに再起動（Actionsの上限が6時間のため）
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 355  # 5時間55分で終了 → 次のcronで再起動

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 設定ファイルをSecretsから生成
        env:
          TARGETS_YAML: ${{ secrets.TARGETS_YAML }}
        run: echo "$TARGETS_YAML" > targets.yml
        # targets.yml はディスク上にのみ存在し、リポジトリには含まれない

      - name: モニター起動（ループ）
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python monitor.py
